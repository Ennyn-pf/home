<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ennyn</title>
  <meta name="description" content="An AI back-office agent for SMBs. Orchestration across the systems your business already runs on.">
  <style>
    :root {
      --ink: #16140f;
      --paper: #f4efe4;
      --paper-2: #ece4d3;
      --rust: #b4471f;
      --muted: #4a4536;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    main {
      max-width: 560px;
      width: 100%;
    }
    .kicker {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--rust);
      font-weight: 600;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(40px, 6vw, 56px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.0;
      margin-bottom: 22px;
    }
    p {
      color: var(--muted);
      font-size: 18px;
      max-width: 48ch;
    }
    .footer {
      margin-top: 48px;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #7a7360;
    }
  </style>
</head>
<body>
  <main>
    <p class="kicker">Ennyn · Stealth</p>
    <h1>Coming soon.</h1>
    <p>The AI back-office agent for SMBs. Orchestration across the systems your business already runs on.</p>
    <p class="footer">ennyn.io</p>
  </main>
</body>
</html>
